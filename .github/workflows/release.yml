name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-release:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checksums
        shell: bash
        run: |
          cd release
          sha256sum * > SHA256SUMS-linux.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/SHA256SUMS-linux.txt

  windows-release:
    name: Windows Installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run telemetry:windows:self-test
      - run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checksums
        shell: pwsh
        run: |
          Set-Location release
          Get-ChildItem -File | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)"
          } | Set-Content SHA256SUMS-windows.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/SHA256SUMS-windows.txt
